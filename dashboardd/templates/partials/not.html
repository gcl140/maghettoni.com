<!-- Notification Modal -->
<dialog id="notificationDialog" class="rounded-xl shadow-2xl p-0 w-full md:max-w-md backdrop:bg-gray-900/50">
  <div class="bg-brown-800 px-5 pt-5 pb-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-white flex items-center">
        <i class="fas fa-bell mr-2 text-brown-300"></i> Taarifa
      </h3>
      <button onclick="document.getElementById('notificationDialog').close()"
              class="text-brown-300 hover:text-white transition-colors p-1">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="notif-list" class="space-y-3 max-h-80 overflow-y-auto">
      <p class="text-sm text-brown-300 text-center py-6">
        <i class="fas fa-spinner fa-spin mr-2"></i> Inapakia...
      </p>
    </div>
  </div>
  <div class="bg-brown-700/30 px-5 py-3 flex justify-end">
    <button onclick="document.getElementById('notificationDialog').close()"
            class="inline-flex items-center px-4 py-2 bg-red-700 hover:bg-red-800 text-white text-sm font-medium rounded-lg transition-colors">
      Funga
    </button>
  </div>
</dialog>
