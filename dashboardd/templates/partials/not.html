<!-- Notification Modal -->
<dialog id="notificationDialog" class="rounded-2xl shadow-2xl border border-gray-200 p-0 w-full md:max-w-md overflow-hidden backdrop:bg-black/30">
  <div class="bg-white px-5 pt-5 pb-4">
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-base font-semibold text-gray-800 flex items-center">
        <i class="fas fa-bell mr-2 text-brown-600"></i> Taarifa
      </h3>
      <button onclick="document.getElementById('notificationDialog').close()"
              class="text-gray-400 hover:text-gray-600 transition-colors p-1 rounded-lg hover:bg-gray-100">
        <i class="fas fa-times"></i>
      </button>
    </div>
    <div id="notif-list" class="space-y-2 max-h-80 overflow-y-auto pr-1">
      <p class="text-sm text-gray-400 text-center py-6">
        <i class="fas fa-spinner fa-spin mr-2"></i> Inapakia...
      </p>
    </div>
  </div>
  <div class="bg-gray-50 border-t border-gray-100 px-5 py-3 flex justify-between items-center">
    <span class="text-xs text-gray-400">Maghettoni Dashboard</span>
    <button onclick="document.getElementById('notificationDialog').close()"
            class="inline-flex items-center px-4 py-2 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-lg transition-colors">
      Funga
    </button>
  </div>
</dialog>
