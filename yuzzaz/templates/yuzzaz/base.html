{% load static %}
<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Login - Maghettoni!{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/styles.css' %}" />
    <link rel="icon" type="image/x-icon" href="{% static 'images/fav.png' %}" />
    <link
      rel="stylesheet"
      type="text/css"
      href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css"
    />
    <script
      type="text/javascript"
      src="https://cdn.jsdelivr.net/npm/toastify-js"
    ></script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Sen:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <link rel="stylesheet" href="{% static 'css/tailwind.css' %}" />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Inter:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />

    <script src="{% static 'js/head-yuzzaz.js'%}"></script>
  </head>
  <body
    class="bg-brown-900 font-sans"
    data-user-name="{% if user.is_authenticated %}{{ user.username }}{% else %}None{% endif %}"
  >
    <div class="min-h-screen flex items-center justify-center p-4">
      <!-- Login Container -->
      <div
      {% if "register" in request.path %}
      class=""
      {% else %}
      class="w-full max-w-lg bg-brown-800 rounded-2xl border border-gray-700 shadow-2xl p-8"
        {% endif %}
      >
        {% block content %}{% endblock %}
      </div>
    </div>

    {% block scripts %} {% endblock %}
    {% if messages %}
    <div id="yuzzaz-toast-messages" class="hidden" aria-hidden="true">
      {% for message in messages %}
      <div data-message="{{ message|escapejs }}" data-tags="{{ message.tags|escapejs }}" data-duration="15000"></div>
      {% endfor %}
    </div>
    {% endif %}
  <script src="{% static 'js/yuzzaz/messages.js' %}"></script>
  <script src="{% static 'js/btn-loading.js' %}"></script>
  </body>
</html>
